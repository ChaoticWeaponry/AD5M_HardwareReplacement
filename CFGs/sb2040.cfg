[mcu SB2040]
canbus_uuid=fe1483fc3997

[temperature_sensor SB2040]
sensor_type: temperature_mcu
sensor_mcu: SB2040

[lis2dw]
cs_pin: SB2040:gpio12
spi_software_sclk_pin: SB2040:gpio2
spi_software_mosi_pin: SB2040:gpio3
spi_software_miso_pin: SB2040:gpio4
#spi_bus: spi0_gpio4_gpio3_gpio2
axes_map: y, -x, z

[resonance_tester]
accel_chip: lis2dw
probe_points: 0, 0, 100
# Somewhere slightly above the middle of your print bed
min_freq: 5
max_freq: 133
accel_per_hz: 75
hz_per_sec: 1 

[extruder]
sensor_type: ATC Semitec 104NT-4-R025H42G
pullup_resistor: 1000
sensor_pin: SB2040:gpio27
step_pin:SB2040:gpio14
dir_pin:SB2040:gpio13
enable_pin: !SB2040:gpio16
rotation_distance: 4.4
## rotation_distance = The original rotation_distance multiplied by the actual extrusion length divided by the requested extrusion length.
## Calibration: 22.44 = old value 22 * actual value 102 / target value 100
##gear_ratio:50:10
## Gear ratio (Galileo 7.5:1 and comment this line; BMG is 50:17, output shaft in front, input shaft in back)
microsteps:16
full_steps_per_rotation: 200
nozzle_diameter:0.400
filament_diameter:1.75
heater_pin:SB2040:gpio23
min_temp:-200
max_temp:350
max_power:1.0
min_extrude_temp:10
pressure_advance: 0.035
pressure_advance_smooth_time: 0.040
#max_extrude_only_distance: 200.0   # If extrusion flow error occurs, comment this, but it's recommended to re-slice
# Nozzle temperature PID calibration command:  "PID_CALIBRATE HEATER=extruder TARGET=245
step_pulse_duration: 0.000004
max_extrude_only_distance: 200

[tmc2240 extruder]
uart_pin:SB2040:gpio15
interpolate:True
run_current: 0.75
hold_current: 0.4
rref: 12300
stealthchop_threshold: 0
driver_TPFD: 0
driver_SLOPE_CONTROL: 2

[fan]
pin:SB2040:gpio24
tachometer_pin:^SB2040:gpio19

[fan_generic Hotend]
pin:SB2040:gpio21
cycle_time: 0.00005
max_power: 0.8
off_below: 0.2
kick_start_time: 0.2
