[include mainsail.cfg]
[include manta-m8p.cfg]
[include sb2040.cfg]
[include macro.cfg]
[include ad5m-macro.cfg]

[temperature_sensor CM4]
sensor_type: temperature_host

[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[skew_correction]

[skew_correction skew_profile]
xy_skew = 0.0
xz_skew = 0.0
yz_skew = 0.0

### CONFIG TO BYPASS MOTOR SAFETY ###
#[force_move]
#enable_force_move: true

[homing_override]
gcode:
    # Limit acceleration for homing and moves on print start
    M204 S5000
    G28 Z0
    G28 X0
    G1 X108
    G28 Y0
    G90
    G1 X95 Y95 Z200 F1800

[heater_bed]
#control: pid
#pid_Kp: 74.730
#pid_Ki: 1.724
#pid_Kd: 809.891

[extruder]
#control: pid
#pid_kp: 39.873
#pid_ki: 8.055
#pid_kd: 49.344

# TMC AUTOTUNE SECTION #
#[autotune_tmc stepper_x]
#motor: moons2a
#tuning_goal: performance
#extra_hysteresis: 2

#[autotune_tmc stepper_y]
#motor: moons2a
#tuning_goal: performance
#extra_hysteresis: 2

#[autotune_tmc stepper_z]
#motor: moons2a
#tuning_goal: performance
#extra_hysteresis: 2

#[autotune_tmc extruder]
#motor: extruder
#tuning_goal: performance

#[motor_constants moons2a]
#resistance: 1.05
#inductance: 0.0028
#holding_torque: 0.39
#max_current: 2.0
#steps_per_revolution: 400

#[motor_constants extruder]
#resistance: 2.0
#inductance: 0.0012
#holding_torque: 0.09
#max_current: 1.0
#steps_per_revolution: 200

