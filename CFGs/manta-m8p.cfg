[heater_bed]
heater_pin: PA0
sensor_pin: PB1 # TB 
sensor_type: ATC Semitec 104GT-2
min_temp: -100
max_temp: 130

#[temperature_sensor X-Motor]
#sensor_pin: PB0
#sensor_type: Generic 3950
#min_temp: -100
#max_temp: 100

#[temperature_sensor Y-Motor]
#sensor_pin: PC5
#sensor_type: Generic 3950
#min_temp: -100
#max_temp: 100

#[temperature_sensor Z-Motor]
#sensor_pin: PC4
#sensor_type: Generic 3950
#min_temp: -100
#max_temp: 100

#[temperature_sensor Chamber]
#sensor_pin: PA7
#sensor_type: Generic 3950
#min_temp: -100
#max_temp: 100

#[fan_generic soc-fan]
#pin: host:gpio79  #CB1
#pin: host:gpio26  #CM4

# Fan0
[fan_generic Chamber_Exhaust]
pin: PF7
cycle_time: 0.00005
kick_start_time: 0.3

# Fan1
[fan_generic Chamber_Intake]
pin: PF9
cycle_time: 0.00005
kick_start_time: 0.3

## Fan2
#[heater_fan fan2]
#pin: PF6

## Fan3
#[heater_fan fan3]
#pin: PF8

## Fan4
#[heater_fan fan4]
#pin: PA4

## Fan5
[fan_generic Mainboard]
pin: PA6
tachometer_pin: PC2
hardware_pwm: true
cycle_time: 0.00004
kick_start_time: 0.3
#max_power: 1
#fan_speed: 1
#idle_timeout: 60
#idle_speed: 0.5
#heater: heater_bed, extruder
#stepper: stepper_x, stepper_y, stepper_z

## Fan6
[fan_generic Stepper]
pin: PA2
tachometer_pin: PC1
hardware_pwm: true
cycle_time: 0.00004
kick_start_time: 0.3
#max_power: 1
#fan_speed: 0.8
#idle_timeout: 60
#idle_speed: 0.5
#stepper: stepper_x, stepper_y, stepper_z

### BEEPER ON FAN 3 PIN ###
#[output_pin _beeper]
#pin: PF8
#pwm: true
#value: 0
#shutdown_value: 0
#cycle_time: 0.001

##LED configuration
[led Chamber]
white_pin: PA1
cycle_time: 0.0001
initial_WHITE: 1.0

[mcu]
canbus_uuid: 8e5678e50b21

[printer]
kinematics: corexy
max_velocity: 600
max_accel: 20000
max_z_velocity: 25
max_z_accel: 500
square_corner_velocity: 10

