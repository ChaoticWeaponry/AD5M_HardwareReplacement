run_current: 1.2
hold_current: 1.1
stealthchop_threshold: 0
interpolate: True
driver_TOFF: 4
driver_HSTRT: 5
driver_HEND: 2
driver_PWM_FREQ: 1
driver_multistep_filt: True
driver_slope_control: 3

## Motor3
[tmc2240 stepper_z]
cs_pin: PB9
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
