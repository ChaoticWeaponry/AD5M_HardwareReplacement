## Probe Configuration
[probe]
pin: !PD12
#z_offset: -0.25
speed: 1.5
lift_speed: 5
samples: 2
samples_tolerance_retries: 1

# Bed Mesh Calibration                   
[bed_mesh]                         
speed: 200                          
horizontal_move_z:4
move_check_distance: 5
mesh_min: -105, -105            
mesh_max: 105, 105             
probe_count: 10, 10                  
mesh_pps: 3, 3                     
algorithm: bicubic                 
bicubic_tension: 0.2
fade_start: 0.3
fade_end: 2.4
fade_target: 0

