run_current: 1.1
hold_current: 0.9
stealthchop_threshold: 0
interpolate: True
driver_TOFF: 4
driver_HSTRT: 5
driver_HEND: 2
driver_PWM_FREQ: 1
driver_multistep_filt: True
driver_slope_control: 3

