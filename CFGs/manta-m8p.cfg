# TMC2130 configuration
########################################

## Motor1
[tmc2240 stepper_x]
cs_pin: PC13
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
#diag1_pin: PF4
run_current: 1.2
hold_current: 1.1
stealthchop_threshold: 0
interpolate: True
driver_TOFF: 4
driver_HSTRT: 5
driver_HEND: 2
driver_PWM_FREQ: 1
driver_multistep_filt: True
driver_slope_control: 3

## Motor2
[tmc2240 stepper_y]
cs_pin: PE3
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
